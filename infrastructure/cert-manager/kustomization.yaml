---
# ============================================================
# cert-manager is installed via Helm by ArgoCD (see argocd/apps/infra-cert-manager.yaml)
# This kustomization manages post-install resources: ClusterIssuers
# Apply AFTER cert-manager pods are running
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - cluster-issuer-staging.yaml
  - cluster-issuer-prod.yaml
