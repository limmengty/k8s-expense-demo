---
# ============================================================
# Let's Encrypt staging issuer — test cert issuance without rate limits
# Uses HTTP-01 challenge via ingress-nginx (works with Cloudflare DNS)
# ============================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: nanokh9988@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
