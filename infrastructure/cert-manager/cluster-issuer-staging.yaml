---
# ============================================================
# Let's Encrypt staging issuer — test cert issuance without rate limits
# Use this first before switching to letsencrypt-prod
# ============================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: nanokh9988@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      # DNS-01 challenge required for wildcard cert *.limmengty.com
      - dns01:
          digitalocean:
            tokenSecretRef:
              name: digitalocean-dns-token
              key: access-token
