# ============================================================
# Keycloak — Helm values for DigitalOcean DOKS
# Chart: bitnami/keycloak
# Realm: expense (imported at startup via KC_IMPORT_REALM)
# ============================================================

# Bitnami moved container images off Docker Hub — use their own registry
global:
  imageRegistry: registry.bitnami.com

auth:
  adminUser: admin
  # adminPassword set via external secret (keycloak-secret)
  existingSecret: keycloak-secret
  existingSecretKey: admin-password

# PostgreSQL (separate deployment — use existing RDS/DOKS PG for prod)
postgresql:
  enabled: true
  auth:
    username: keycloak
    database: keycloak
    existingSecret: keycloak-db-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password

# TLS terminated at ingress (nginx) — Keycloak serves HTTP internally.
# Chart's production mode requires tls.enabled=true (internal TLS), which
# conflicts with edge-termination. KC_PROXY=edge handles the security instead.
production: false

tls:
  enabled: false

ingress:
  enabled: true
  ingressClassName: nginx
  hostname: keycloak.limmengty.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  tls: true

# Keycloak env — issuer URL must match what API and UI use
extraEnvVars:
  - name: KC_HOSTNAME
    value: keycloak.limmengty.com
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_PROXY
    value: edge

extraEnvVarsSecret: keycloak-secret

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

replicaCount: 2
