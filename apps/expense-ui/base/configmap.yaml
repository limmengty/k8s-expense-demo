---
apiVersion: v1
kind: ConfigMap
metadata:
  name: expense-ui-configmap
  namespace: expense-ui
  labels:
    app.kubernetes.io/name: expense-ui
data:
  # Matches .env.local: NEXT_PUBLIC_API_URL — patched per environment by overlay
  NEXT_PUBLIC_API_URL: "https://expense-api.limmengty.com"
  # Matches .env.local: API_URL (server-side SSR) — patched per environment by overlay
  API_URL: "https://expense-api.limmengty.com"
  NODE_ENV: "production"
