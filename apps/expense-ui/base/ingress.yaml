---
# ============================================================
# demok8s / apps/expense-ui/base/ingress.yaml
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: expense-ui-ingress
  namespace: expense-ui
  labels:
    app.kubernetes.io/name: expense-ui
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # TLS managed by cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - expense.example.com       # patched per environment
      secretName: expense-ui-tls
  rules:
    - host: expense.example.com    # patched per environment
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: expense-ui-service
                port:
                  name: http
