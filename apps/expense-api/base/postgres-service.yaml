---
# ============================================================
# demok8s / apps/expense-api/base/postgres-service.yaml
# ExternalName service — routes postgres-service DNS to the
# external VM that hosts expense-api's PostgreSQL.
# VM_IP is patched per environment via overlay.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: expense-api
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  type: ExternalName
  externalName: 152.42.204.173   # patched by overlay
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
