---
# ============================================================
# demok8s / apps/expense-api/base/postgres-pvc.yaml
# PersistentVolumeClaim for PostgreSQL data
# StorageClass: do-block-storage (DigitalOcean block storage, RWO)
# Size patched per environment: 5Gi dev/staging, 20Gi prod
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: expense-api
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 5Gi
