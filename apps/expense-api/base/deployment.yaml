---
# ============================================================
# demok8s / apps/expense-api/base/deployment.yaml
# Spring Boot 4 / Java 21 — production-grade deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-api
  namespace: expense-api
  labels:
    app.kubernetes.io/name: expense-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: expense-platform
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  # Replicas managed by HPA — this is the starting count
  replicas: 2
  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app.kubernetes.io/name: expense-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime deployment

  template:
    metadata:
      labels:
        app.kubernetes.io/name: expense-api
        app.kubernetes.io/component: backend
      annotations:
        checksum/config: "placeholder"

    spec:
      serviceAccountName: expense-api-sa
      terminationGracePeriodSeconds: 60

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Anti-affinity: spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: expense-api

      containers:
        - name: expense-api
          # image is patched per environment by kustomize
          image: mengty199/expense-api:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: expense-api-configmap
            - secretRef:
                name: expense-api-secret
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: expense-api-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # startupProbe allows Spring Boot + Liquibase migrations to complete
          # before liveness/readiness checks begin (up to 5 minutes)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
