---
# ============================================================
# demok8s / apps/expense-api/base/networkpolicy.yaml
# Restrict pod-to-pod traffic to only what is necessary
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: expense-api-netpol
  namespace: expense-api
  labels:
    app.kubernetes.io/name: expense-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: expense-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
    # Allow SSR calls from expense-ui namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: expense-ui
      ports:
        - port: 8080
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
    # Allow outbound to external VM PostgreSQL (ExternalName service resolves to VM IP)
    - ports:
        - port: 5432
          protocol: TCP
    # Allow outbound to Keycloak and any HTTPS (VM-hosted, no in-cluster pod restriction)
    - ports:
        - port: 443
          protocol: TCP
    # Allow outbound to Keycloak HTTP (internal VM port, proxied by nginx)
    - ports:
        - port: 80
          protocol: TCP
