---
# ============================================================
# demok8s / argocd/apps/infra-keycloak.yaml
# Installs Keycloak + PostgreSQL using official public images
# quay.io/keycloak/keycloak:26 + postgres:16-alpine
# NOTE: Create keycloak-secret and keycloak-db-secret before syncing
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-keycloak
  namespace: argocd
  labels:
    app.kubernetes.io/name: keycloak
    layer: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/limmengty/k8s-expense-demo.git
    targetRevision: main
    path: infrastructure/keycloak

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
