---
# ============================================================
# demok8s / argocd/apps/infra-ingress-nginx.yaml
# Installs NGINX Ingress Controller via Helm with values from CD repo
# Multi-source (ArgoCD ≥ 2.6): Helm chart + values file from Git
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/name: ingress-nginx
    layer: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Source 1: Helm chart from official ingress-nginx repo
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.11.x
      helm:
        valueFiles:
          - $values/infrastructure/ingress-nginx/helm-values.yaml

    # Source 2: CD repo — provides $values reference for helm values file
    - repoURL: https://github.com/limmengty/k8s-expense-demo.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
