---
# ============================================================
# demok8s / argocd/apps/expense-ui-staging.yaml
# ArgoCD Application — expense-ui staging environment
# Apply: kubectl apply -f argocd/apps/expense-ui-staging.yaml -n argocd
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: expense-ui-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: expense-ui
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: expense

  source:
    repoURL: https://github.com/limmengty/k8s-expense-demo.git
    targetRevision: main
    path: demok8s/apps/expense-ui/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: expense-ui-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
